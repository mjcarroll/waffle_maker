name: Update Dashboard Cache

on:
  schedule:
    # Daily at 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Fetch fresh data
        env:
          GITHUB_TOKEN: ${{ secrets.WAFFLE_GITHUB_TOKEN }}
        run: uv run python fetch_data.py

      - name: Commit updated cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .cache/
          if git diff --cached --quiet; then
            echo "No cache changes to commit"
          else
            git commit -m "chore: update dashboard cache"
            git push
          fi
